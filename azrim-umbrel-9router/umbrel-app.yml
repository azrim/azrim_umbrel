manifestVersion: 1.1
id: azrim-umbrel-9router
name: 9Router
tagline: Free AI router — multi-provider LLM gateway (Grok, OpenRouter, combos)
icon: https://avatars.githubusercontent.com/u/8282593?v=4
category: developer
version: "0.5.40"
port: 20128
description: >-
  9Router (decolua/9router) is a local OpenAI-compatible AI gateway with a web
  dashboard. Connect free and paid providers, combos, and Grok paths
  (grok-web cookie / grok-cli OAuth / xai API). Data persists under the app
  volume. Set a dashboard password on first open.

  Note: Heavy browser farm work should stay on a larger VPS; this app is for
  Umbrel UI + Hermes routing on your home box.
developer: decolua / Azrim packaging
website: https://9router.com
dependencies: []
repo: https://github.com/decolua/9router
support: https://github.com/decolua/9router/issues
gallery: []
path: ""
permissions: []
releaseNotes: >-
  Initial Umbrel package: decolua/9router:latest on port 20128, DATA_DIR volume,
  Umbrel app_proxy with PROXY_AUTH_ADD=false (use 9Router's own login).
submitter: Azrim
submission: https://github.com/azrim/azrim_umbrel
