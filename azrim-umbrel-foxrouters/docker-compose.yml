# FoxRouters — CodeBuddy + Grok OpenAI-compatible gateway
# Upstream: https://github.com/rilspratama/Foxrouters (v1.6.1)
# SQLite log backend (no ClickHouse) — lighter for Umbrel 4GB boxes.
#
# Umbrel app_proxy: APP_HOST must resolve on the app network.
# Prefer long name (…_server_1) like Email Vault / 9Router packages.
# If proxy 502 while server logs "started", check APP_HOST + listen 0.0.0.0.
services:
  app_proxy:
    environment:
      APP_HOST: azrim-umbrel-foxrouters_server_1
      APP_PORT: 20130
      PROXY_AUTH_ADD: "false"

  redis:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  server:
    image: ghcr.io/rilspratama/foxrouters:v1.6.1
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TZ=Asia/Jakarta
      - PORT=20130
      # Listen on all interfaces so Umbrel app_proxy can reach this container
      - HOST=0.0.0.0
      - REDIS_ADDR=redis:6379
      - LOG_BACKEND=sqlite
      - LOG_SQLITE_PATH=/var/lib/foxrouters/logs.db
      - GATEWAY_KEY_FILE=/var/lib/foxrouters/gateway-key.txt
    volumes:
      - ${APP_DATA_DIR}/data/foxrouters:/var/lib/foxrouters
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
