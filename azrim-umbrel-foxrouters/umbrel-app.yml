manifestVersion: 1.1
id: azrim-umbrel-foxrouters
name: FoxRouters
tagline: OpenAI-compatible gateway for CodeBuddy (ck_*) + Grok
icon: https://avatars.githubusercontent.com/u/8282593?v=4
category: developer
version: "1.6.1-r3"
port: 20130
description: >-
  FoxRouters is a local OpenAI-compatible AI gateway focused on CodeBuddy
  (API keys ck_* and OAuth) and Grok. Import farm API keys, round-robin
  accounts, credit meter sync, circuit breaker, and a web dashboard.

  Replaces 9Router for CodeBuddy global (cb/* models). Dashboard and API
  share port 20130 behind Umbrel app proxy. Heavy account farming stays on
  a larger VPS; this app is for Umbrel UI + Hermes routing.

  After first start, read the gateway admin key from app data
  (gateway-key.txt) or container logs (AUTO-BOOTSTRAP). Create/import
  CodeBuddy keys in the dashboard or via POST /cb/import.
