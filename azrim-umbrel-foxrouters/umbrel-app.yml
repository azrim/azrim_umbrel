path: ""
permissions: []
releaseNotes: >-
  Initial Umbrel package: FoxRouters v1.6.1 + Redis (SQLite logs). Port 20130.
  PROXY_AUTH_ADD=false so FoxRouters cookie login stays. Use instead of 9Router
  for CodeBuddy ck_* pools.
