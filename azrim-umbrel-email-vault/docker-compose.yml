# Email Vault — alias pool + Gmail finder (phase 1)
services:
  app_proxy:
    environment:
      # Same naming style as azrim-umbrel-navidrome / immich in this store
      APP_HOST: azrim-umbrel-email-vault_server_1
      APP_PORT: 8787
      # Working apps in this store use false. "true" can leave UI on
      # "starting" if proxy health never finishes through auth.
      PROXY_AUTH_ADD: "false"

  server:
    image: ghcr.io/azrim/email-vault-panel:0.1.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      - TZ=Asia/Jakarta
      - DATA_DIR=/data
      - DEFAULT_DOMAIN=sukiliar.pro
      - HOST=0.0.0.0
      - PORT=8787
    volumes:
      - ${APP_DATA_DIR}/data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
