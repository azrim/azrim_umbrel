version: "3.7"
services:
  app_proxy:
    environment:
      APP_HOST: azrim-umbrel-qbittorrent_server_1
      APP_PORT: 8112
      PROXY_AUTH_ADD: "false"

  server:
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Jakarta
      - WEBUI_PORT=8112
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/data/storage/downloads:/downloads
    ports:
      - 6881:6881
      - 6881:6881/udp
